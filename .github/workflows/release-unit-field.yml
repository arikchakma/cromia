name: Publish unit-field

on:
  push:
    tags:
      - 'unit-field@v*'

jobs:
  release:
    uses: arikchakma/workflows/.github/workflows/release-pnpm.yml@v1
    permissions:
      contents: write
      id-token: write
    with:
      publish: true
      build: pnpm run build
      publish-directory: packages/unit-field
    secrets: inherit
